<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>刮刮乐 - 在线版</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div id="app" v-cloak>
  <!-- ========== 加载中 ========== -->
  <div class="loading" v-if="loading">加载中...</div>

  <template v-if="!loading">
  <!-- ========== 顶栏 ========== -->
  <div class="topbar" v-if="user.loggedIn">
    <button class="btn-cheat" v-if="!scratching" @click="cheat" :disabled="cheating">开滴滴</button>

    <div class="souvenirs" v-if="!scratching">
      <div class="souv-item" v-for="(s, i) in souvenirs" :key="i">
        <div class="souv-icon" :style="{background: cardColors[i]}"></div>
        <span class="souv-count">x{{ s }}</span>
      </div>
      <span class="balance">持有: {{ fmtMoney(user.balance) }}方斯</span>
    </div>

    <span class="profit" v-if="!scratching && user.profit > 0">你已经盈利了{{ fmtMoney(user.profit) }}方斯</span>
    <span class="profit" v-else-if="!scratching && user.profit < 0">你已经亏损了{{ fmtMoney(-user.profit) }}方斯</span>
    <span class="profit" v-else-if="!scratching">你目前不赚不赔</span>

    <button class="btn-logout" @click="logout">退出登录</button>
  </div>

  <!-- ========== 登录/注册弹窗 ========== -->
  <div class="overlay" v-if="!user.loggedIn">
    <div class="modal">
      <h2>{{ loginMode ? '登录' : '注册' }}</h2>
      <input v-model="auth.username" placeholder="用户名" maxlength="32">
      <input v-model="auth.password" type="password" placeholder="密码" maxlength="64">
      <div class="modal-btns">
        <button class="btn" @click="doAuth">{{ loginMode ? '登录' : '注册' }}</button>
        <a @click.prevent="loginMode=!loginMode">
          {{ loginMode ? '没有账号？注册' : '已有账号？登录' }}
        </a>
      </div>
      <p class="error" v-if="authError">{{ authError }}</p>
    </div>
  </div>

  <!-- ========== 排位榜弹窗 ========== -->
  <div class="overlay" v-if="showRanking" @click.self="showRanking=false">
    <div class="modal wide">
      <h2>🏆 排行榜</h2>
      <div class="tabs">
        <button :class="{active:rankTab==='profit'}" @click="loadRanking('profit')">富爪榜</button>
        <button :class="{active:rankTab==='loss'}" @click="loadRanking('loss')">负爪榜</button>
      </div>
      <div class="rank-list">
        <div class="rank-row" v-for="r in ranking" :key="r.rank">
          <span class="rank-num">#{{ r.rank }}</span>
          <span class="rank-name">{{ r.username }}</span>
          <span class="rank-val" :class="rankTab==='loss'?'loss':''">
            {{ fmtMoney(r.value) }}方斯
          </span>
        </div>
        <p v-if="ranking.length===0">暂无数据</p>
      </div>
      <button class="btn" @click="showRanking=false">关闭</button>
    </div>
  </div>

  <!-- ========== 作弊弹窗 ========== -->
  <div class="overlay" v-if="cheatMsg" @click="cheatMsg=''">
    <div class="modal">
      <h2>滴滴出行</h2>
      <p class="cheat-text">{{ cheatMsg }}</p>
      <p v-if="cheatAmount" class="cheat-amt">收入 {{ fmtMoney(cheatAmount) }} 方斯</p>
      <button class="btn" @click="cheatMsg=''">关闭</button>
    </div>
  </div>

  <!-- ========== 选购页 ========== -->
  <div class="main-area" v-if="!scratching && user.loggedIn">
    <div class="cards-row">
      <div class="card" v-for="(c, i) in cardTypes" :key="i"
           :class="{selected: selectedCard===i}" @click="selectedCard=i">
        <div class="card-img" :style="{background: c.color}">
          <span class="card-name">{{ c.name }}</span>
        </div>
        <p class="card-desc">{{ c.name }}</p>
        <p class="card-chance">{{ c.positions }}次刮开机会</p>
        <div class="card-price">
          <span class="coin">🪙</span>
          <span class="price-num">{{ fmtMoney(c.cost) }}</span>
        </div>
      </div>
    </div>

    <div class="bottombar">
      <span class="tip">仅供娱乐，理性购买</span>
      <div class="btns-right">
        <button class="btn" @click="openRanking">排行榜</button>
        <button class="btn primary" :disabled="selectedCard<0" @click="buyCard">购买</button>
      </div>
    </div>
  </div>

  <!-- ========== 刮奖页 ========== -->
  <div class="scratch-area" v-if="scratching && user.loggedIn">
    <h2 class="scratch-title">{{ currentCard.cardName }} - 刮开涂层!</h2>

    <div class="grid" :style="gridStyle">
      <div class="cell" v-for="(cell, idx) in currentCard.cells" :key="idx"
           :class="{win: cell.isWin}">
        <div class="cell-top" :style="{background: cell.isWin ? '#FFC832' : '#64646E'}">
          {{ cell.isWin ? '中奖!' : '未中奖' }}
        </div>
        <div class="cell-bot">
          {{ fmtMoney(cell.displayPrize) }}
        </div>
        <canvas :ref="el => cellCanvases[idx] = el"
                class="cell-coating"
                @mousedown="startScratch(idx, $event)"
                @mousemove="doScratch(idx, $event)"
                @mouseup="stopScratch"
                @touchstart.prevent="startScratchTouch(idx, $event)"
                @touchmove.prevent="doScratchTouch(idx, $event)"
                @touchend.prevent="stopScratch">
        </canvas>
      </div>
    </div>

    <div class="bottombar">
      <span class="tip">刮开进度: {{ revealPct.toFixed(1) }}%</span>
      <button class="btn" v-if="showReturnBtn" @click="doReturn">返回</button>
      <button class="btn" @click="revealAll">一键全部刮开</button>
    </div>
  </div>

  <!-- ========== 结果弹窗 ========== -->
  <div class="overlay" v-if="showResult" @click="doReturn">
    <div class="modal" @click.stop>
      <h2>{{ currentCard.totalPrize > 0 ? '恭喜中奖!' : '很遗憾' }}</h2>
      <div class="souv-big" :style="{background: cardTypes[currentCard.cardType].color}">
        纪念品
      </div>
      <p v-if="currentCard.totalPrize > 0" class="prize-text">
        中奖金额: {{ fmtMoney(currentCard.totalPrize) }}方斯
      </p>
      <div class="modal-btns">
        <button class="btn" @click="showResult=false;showReturnBtn=true">留在此页</button>
        <button class="btn primary" @click="doReturn">返回</button>
      </div>
    </div>
  </div>

  <!-- ========== 存档提示 ========== -->
  <div class="toast" v-if="toast">{{ toast }}</div>
  </template>
</div>

<script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
<script src="/js/scratch.js"></script>
<script src="/js/app.js"></script>
</body>
</html>
